# VideoSuiteYT Configuration
# Edit this file to customize your settings

gpu:
  enabled: true
  vram_total_gb: 12.0
  vram_target_gb: 10.0
  fallback_to_cpu: true

ollama:
  base_url: "http://localhost:11434"
  default_model: "llama3.1:8b-q4_K_M"
  context_size: 4096
  temperature: 0.7
  max_tokens: 2048

tts:
  engine: "orpheus"
  default_voice: "default"
  sample_rate: 22050
  speed: 1.0

whisper:
  model_size: "small"
  language: null
  use_gpu: true

video:
  resolution: "1080x1920"
  fps: 30
  bitrate: "8M"
  codec: "h264"
  preset: "fast"

# Server settings
host: "127.0.0.1"
port: 8000
debug: false

# Paths (relative to backend directory)
models_dir: "../models"
projects_dir: "../projects"
output_dir: "../output"